<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Score</title>
    <link rel="stylesheet" href="../assets/css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

    <section class="top_section">
        <div class="top_section_card">
            <div class="intro_card">
                <div class="profile_image_card"><img id="userimage" src="" alt="profile image"></div>
                <p id="username"></p>
            </div>
            <p class="user_bio"><span id="userbio"></span></p>
            <div class="top_ection_stat">
                <div class="top_section_stat_card">
                    <p id="userfollowers" class="stat_number"></p>
                    <p class="stat_info">Followers</p>
                </div>
                <div class="top_section_stat_card">
                    <p id="user_following" class="stat_number"></p>
                    <p class="stat_info">Following</p>
                </div>
                <div class="top_section_stat_card">
                    <p id="user_public_repos" class="stat_number"></p>
                    <p class="stat_info">Repos</p>
                </div>
            </div>
        </div>
        <div class="top_section_card">
            <p class="Estimated">Estimated Developer Worth</p>
            <p id="account_worth">$42,930</p>
            <div class="confi_and_details">
                <div class="confidence">
                    <p>Analysis Confidence</p>
                    <div class="confidence_meter"></div>
                </div>
                <button id="details_btn">DETAILS <span id="arrow_left" class="material-symbols-outlined">arrow_forward</span></button>
            </div>
        </div>
    </section>
    <!-- ai insight section -->
    <section class="ai_insight">

    </section>
    <script src="../assets/js/profile.js"></script>
    <!-- <script src="navbar.js"></script> -->
</body>
</ht
