<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"></head>
<body>
    <div id="top-navbar"></div>
    <section class="search-section"> 
        <h1>Analyze GitHub Profiles <span>Instantly</span> </h1>
        <p class="search-section-bio">Discover your developer worth and repository insights in seconds. Leveraging neural data mapping for the modern engineer.</p>
        <div class="searchbox">

            <center>

                <div class="search-section-searchbox">
                    <input id="input" type="text" placeholder="Enter your Github username" autocomplete="off">
                    <button onclick="search()">Analyze</button>
                </div>
                <div id="feedback">Please enter your username</div>
                <div class="search-section-fact">
                    <p>Trusted by 10k+ Devs</p>
                    <p>Real-time API Sync</p>
                    <p>Open Source</p>
                </div>
            </center>
            </div> 
    </section>
    <script src="script.js"></script>
</body>
</html>
