<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Score</title>
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>
    <aside id="aside-navbar" class="aside-navbar">
    </aside>
    <main id="main">

        <section class="top-profile">
            <div class="prodile-pic-card">
                <img src="" alt="" id="userimage">
            </div>
            <div class="profile-bio">
                <div class="profile-name-rank">
                    <h1 id="username"></h1>
                    <p id="profilestage">Gold contributor</p>
                </div>
                <p class="profile-bio2" id="userbio"></p>
                <div class="profile-fact">
                    <p><span id="profile-icon" class="material-symbols-outlined">calendar_today</span><span id="datejoined"></span></p>
                    <p><span  id="profile-icon" class="material-symbols-outlined">location_on</span><span id="userlocation"></span></p>
                    <p><span  id="profile-icon" class="material-symbols-outlined">link</span><span><a href="" id="url"></a></span></p>
                </div>
            </div>
        </section>
        <section class="profile-stats">
        <div class="stats-card">
            <div class="stats-heading">
                <p>GLOBAL REACH</p>
                <p><span class="material-symbols-outlined">group</span></p>
            </div>
            <p class="stats-figure" id="userfollowers"></p>
            <p class="stats-bio">Active Followers</p>
            <div class="stats-display"><img src="image/image.png" alt="followers img"></div>
        </div>
        <div class="stats-card">
            <div class="stats-heading">
                <p>OUTPUT</p>
                <p><span class="material-symbols-outlined">terminal</span></p>
            </div>
            <p class="stats-figure" id="user_public_repos"></p>
            <p class="stats-bio">Public Repositories</p>
            <div class="stats-display2">
                <!-- <div class="stats-display2-meter"></div> -->
                <!-- <p class="stats-display2-bio">Top 5% of active contributors</p> -->
            </div>
        </div>
        <div class="stats-card">
            <div class="stats-heading">
                <p>NETWORK</p>
                <p><span class="material-symbols-outlined">person_add</span></p>
            </div>
            <p class="stats-figure" id="user_following"></p>
            <p class="stats-bio">Developer Following</p>
            <div class="stats-display2">
                <div class="stats-display3"><span class="material-symbols-outlined">trending_up</span>+12%</div>
                <div class="stats-display2-bio">vs last month</div>
            </div>
        </div>
    </section>
    </main>
    <script src="profile.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
